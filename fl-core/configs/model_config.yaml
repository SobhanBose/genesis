
# Model Configuration
model:
  name: "PathogenicityPredictor"
  type: "deep_learning"
  
  architecture:
    # Model type selection
    model_type: "ensemble"  # Options: "basic", "improved", "lightweight", "ensemble"
    input_dim: null  # Will be set based on data
    output_dim: 2  # Binary classification
    
    # Hidden dimensions for all model types (fallback values)
    hidden_dims: [512, 256, 128, 64]
    dropout: 0.3
    
    # Basic model settings (uses default architecture)
    basic_model:
      hidden_layers: [512, 256, 64, 32, 16]
      dropout: 0.3
    
    # Improved model specific settings
    improved_model:
      use_attention: true
      attention_heads: 8
      use_residual: true
      feature_extraction_dim: 128
      hidden_dims: [512, 256, 128, 64, 32]
      dropout: 0.3
    
    # Lightweight model specific settings
    lightweight_model:
      hidden_dims: [256, 128, 64]
      dropout: 0.2
      use_attention: false
      use_residual: false
    
    # Ensemble model specific settings
    ensemble_model:
      num_models: 5  # Number of models in ensemble
      ensemble_model_type: "lightweight"  # Type of each ensemble member: "improved" or "lightweight"
      ensemble_weights_learnable: true  # Whether ensemble weights are learnable
      # Individual model settings (inherited from respective model types)
      improved_member_settings:
        hidden_dims: [512, 256, 128, 64, 32]
        dropout: 0.3
        use_attention: true
        attention_heads: 8
      lightweight_member_settings:
        hidden_dims: [512, 256, 128, 64, 32]
        dropout: 0.3
        use_attention: false
    
  training:
    batch_size: 300
    learning_rate: 1e-3
    optimizer: "adam"  # Options: "adam", "adamw", "sgd"
    loss_function: "cross_entropy"  # Options: "cross_entropy", "focal", "label_smoothing", "combined", "uncertainty"
    
    # Learning rate scheduling
    learning_rate_schedule: "reduce_on_plateau"  # Options: "reduce_on_plateau", "cosine_annealing"
    cosine_t_max: 50  # For cosine annealing
    
    # Loss function specific parameters
    focal_alpha: 1.0
    focal_gamma: 2.0
    label_smoothing: 0.1
    uncertainty_weight: 0.1
    
    # Optimizer specific parameters
    weight_decay: 1e-3
    momentum: 0.9  # For SGD
    beta1: 0.9  # For Adam/AdamW
    beta2: 0.999  # For Adam/AdamW
    
    # Training strategies
    use_weighted_sampler: true  # Use weighted random sampler for class imbalance
    max_epochs: 100
    
  regularization:
    weight_decay: 1e-3
    early_stopping: true
    patience: 10
    min_delta: 1e-4
    
    # Additional regularization
    gradient_clipping: true
    max_grad_norm: 1.0
    dropout_schedule: false
    
    # Ensemble specific regularization
    ensemble_regularization:
      diversity_loss_weight: 0.1  # Weight for diversity loss in ensemble
      dropout_variation: true  # Use different dropout rates for ensemble members
    
  feature_engineering:
    enabled: true
    sequence_features: true
    conservation_features: true
    functional_features: true
    population_features: true
    interaction_features: true
    
    # Feature selection
    feature_selection_enabled: false
    feature_selection_method: "mutual_info"  # Options: "mutual_info", "f_classif", "random_forest"
    n_features: 100
    
    # Dimensionality reduction
    use_pca: false
    pca_components: 50
    
    # Scaling
    scaling_method: "standard"  # Options: "standard", "robust", "minmax"
    
  embeddings:
    # Word2Vec settings
    vector_size: 50
    window_size: 3
    min_count: 1
    k_mer_size: 3
    
    # Advanced embeddings
    multi_scale_embeddings: false
    k_mer_sizes: [3, 4, 5]
    embedding_dim: 128
    
  evaluation:
    # Evaluation metrics
    metrics: ["accuracy", "roc_auc", "precision", "recall", "f1"]
    
    # Cross-validation
    use_cross_validation: false  # Set to true to enable k-fold cross validation
    cv_folds: 5  # Number of folds for k-fold cross validation
    cv_random_state: 42  # Random state for reproducible fold splits
    
    # Model comparison
    compare_models: false
    baseline_models: ["basic", "improved", "lightweight"]
    
  logging:
    # Logging settings
    log_level: "INFO"
    save_model_checkpoints: true
    save_training_history: true
    save_feature_importance: true
    
    # Visualization
    plot_training_curves: true
    plot_feature_importance: true
    plot_confusion_matrix: true
