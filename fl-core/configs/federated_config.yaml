# Federated Learning Configuration
federated:
  strategy: "FedProx"  # FedAvg, FedProx, FedNova, FedAdam, etc.
  proximal_mu: 0.01  # Proximal term weight for FedProx (higher = more regularization)
  
  server:
    rounds: 50  # Increased from 30
    min_fit_clients: 2
    min_eval_clients: 0  # No client evaluation needed with centralized evaluation
    min_available_clients: 3  # Total number of clients available
    fraction_fit: 0.67  # Sample 2 out of 3 clients (2/3 = 0.67)
    fraction_evaluate: 0.0  # No client evaluation, use centralized evaluation
    
    # Advanced server settings
    aggregation_method: "weighted_average"  # Options: "simple_average", "weighted_average"
    evaluate_metrics_aggregation: "weighted_average"
    
  client:
    local_epochs: 5
    batch_size: 32
    learning_rate: 1e-4
    
    # Advanced client settings
    use_mixed_precision: false  # Enable for faster training
    gradient_accumulation_steps: 1
    max_grad_norm: 1.0
    
  learning_rate_scheduler:
    learning_rate_schedule: "cosine_annealing"  # Options: constant, step_decay, exponential_decay, cosine_annealing, warmup_then_decay
    lr_decay_interval: 5   # For step_decay: reduce LR every 5 rounds
    lr_decay_factor: 0.7   # For step_decay: multiply LR by 0.7 (reduce by 30%)
    lr_decay_rate: 0.95    # For exponential_decay: multiply LR by this rate each round
    lr_warmup_rounds: 5    # For warmup_then_decay: number of warmup rounds
    min_learning_rate: 1e-6  # Minimum learning rate threshold
    
    # Cosine annealing specific
    cosine_t_max: 50  # Maximum number of rounds for cosine annealing
    
  aggregation:
    weighted: true  # Weight by number of samples
    evaluate_metrics_aggregation: "weighted_average"  # Use weighted average for evaluation metrics
    
    # Advanced aggregation
    momentum: 0.9  # For momentum-based aggregation
    beta: 0.001  # For FedAdam
    
  evaluation:
    server_validation: true
    client_validation: false  # Disable client evaluation, use centralized evaluation
    centralized_evaluation: true  # Enable centralized evaluation with evaluate_fn
    metrics: ["accuracy", "loss", "f1_score", "precision", "recall"]  # Extended metrics
    
    # Evaluation frequency
    evaluate_every_n_rounds: 1
    save_best_model: true
    best_model_metric: "accuracy"
    
  privacy:
    differential_privacy: false
    secure_aggregation: false
    
    # Differential privacy settings (if enabled)
    dp_epsilon: 1.0
    dp_delta: 1e-5
    dp_sensitivity: 1.0
    
  communication:
    # Communication optimization
    compression: false  # Enable gradient compression
    quantization: false  # Enable gradient quantization
    sparsification: false  # Enable gradient sparsification
    
  robustness:
    # Robustness against Byzantine attacks
    byzantine_robust: false
    krum_k: 2  # Number of clients to exclude in Krum aggregation
    
    # Robustness against stragglers
    timeout: 300  # Timeout in seconds for client training
    straggler_mitigation: false
    
  monitoring:
    # Monitoring and logging
    log_client_metrics: true
    log_aggregation_metrics: true
    save_client_models: false
    save_aggregation_history: true
    
    # Performance monitoring
    track_convergence: true
    track_client_diversity: true
    track_communication_efficiency: true
