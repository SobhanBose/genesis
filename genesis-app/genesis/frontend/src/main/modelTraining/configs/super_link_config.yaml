# Super-Link Configuration
# This configuration defines the settings for a super-link that provides
# optimized communication between super-nodes and the central server.

super_link:
  # Basic Configuration
  link_id: "super_link_1"                   # Unique identifier for this super-link
  server_address: "localhost"               # Central server address
  server_port: 8080                         # Central server port
  
  # Compression Configuration
  compression_enabled: true                 # Enable data compression
  compression_algorithm: "gzip"             # Compression algorithm (gzip, lz4, zstd, brotli)
  compression_level: 6                      # Compression level (1=fast, 9=best)
  compression_threshold: 1024               # Minimum data size to compress (bytes)
  
  # Protocol Configuration
  primary_protocol: "https"                 # Primary communication protocol (http, https, grpc, websocket, tcp)
  fallback_protocols:                       # Fallback protocols in order of preference
    - "http"
    - "tcp"
  adaptive_protocol: true                   # Enable adaptive protocol switching
  adaptation_strategy: "hybrid"             # Protocol adaptation strategy (quality_based, latency_based, bandwidth_based, hybrid, manual)
  
  # Quality Monitoring
  quality_threshold: 0.8                    # Minimum quality threshold for protocol switching
  monitoring_interval: 30.0                 # Quality monitoring interval in seconds
  quality_history_size: 100                # Number of quality measurements to keep
  
  # Connection Management
  connection_timeout: 30.0                  # Connection timeout in seconds
  read_timeout: 60.0                        # Read timeout in seconds
  write_timeout: 60.0                       # Write timeout in seconds
  keepalive_interval: 30.0                  # Keepalive interval in seconds
  
  # Retry Configuration
  retry_attempts: 3                         # Number of retry attempts
  retry_delay: 1.0                          # Initial retry delay in seconds
  retry_backoff_factor: 2.0                 # Retry backoff multiplier
  max_retry_delay: 60.0                     # Maximum retry delay in seconds
  
  # Buffer Configuration
  send_buffer_size: 65536                   # Send buffer size in bytes
  receive_buffer_size: 65536                # Receive buffer size in bytes
  max_message_size: 104857600               # Maximum message size in bytes (100MB)
  
  # Security Configuration
  enable_tls: true                          # Enable TLS encryption
  verify_ssl: true                          # Verify SSL certificates
  # certificate_path: "/path/to/cert.pem"   # Path to client certificate
  # private_key_path: "/path/to/key.pem"    # Path to private key
  # ca_certificate_path: "/path/to/ca.pem"  # Path to CA certificate
  
  # Performance Tuning
  enable_tcp_nodelay: true                  # Enable TCP_NODELAY for low latency
  enable_tcp_keepalive: true                # Enable TCP keepalive
  tcp_keepalive_idle: 600                   # TCP keepalive idle time in seconds
  tcp_keepalive_interval: 60                # TCP keepalive probe interval in seconds
  tcp_keepalive_count: 3                    # TCP keepalive probe count
  
  # Monitoring and Logging
  enable_metrics: true                      # Enable metrics collection
  log_level: "INFO"                         # Logging level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
  log_compression_stats: true               # Log compression statistics
  log_protocol_switches: true               # Log protocol switching events
  
  # Advanced Features
  enable_multiplexing: false                # Enable connection multiplexing
  max_concurrent_streams: 100               # Maximum concurrent streams for multiplexing
  enable_flow_control: true                 # Enable flow control
  flow_control_window: 65536                # Flow control window size in bytes

# Advanced Compression Configuration (optional)
compression:
  algorithm_preferences:                    # Algorithm preference scores (0-1)
    gzip: 0.8
    lz4: 0.9
    zstd: 0.95
    brotli: 0.85
  adaptive_compression: true                # Enable adaptive compression algorithm selection
  model_specific_compression: true          # Enable model-specific compression optimizations
  quantization_enabled: false              # Enable parameter quantization
  quantization_bits: 8                     # Number of bits for quantization
  sparsification_enabled: false            # Enable parameter sparsification
  sparsification_threshold: 0.01           # Threshold for sparsification

# Quality Monitoring Configuration (optional)
quality:
  latency_weight: 0.3                       # Weight for latency in quality calculation
  throughput_weight: 0.3                    # Weight for throughput in quality calculation
  reliability_weight: 0.4                   # Weight for reliability in quality calculation
  latency_threshold_ms: 100.0               # Latency threshold in milliseconds
  throughput_threshold_mbps: 10.0           # Throughput threshold in Mbps
  reliability_threshold: 0.95               # Reliability threshold
  degradation_detection_window: 10          # Window size for degradation detection