version: '3.8'

services:
  fl-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"  # REST API
      - "8080:8080"  # FL Server
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=info
      - DEBUG=false
    volumes:
      # Mount persistent data directories
      - ./data:/app/data
      - ./logs:/app/logs
      - ./results:/app/results
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fl-network

networks:
  fl-network:
    driver: bridge